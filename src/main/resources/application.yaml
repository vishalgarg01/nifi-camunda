        username: ${NIFI_MIGRATION_FLOW_XML_SFTP_USERNAME:capillary}
        password: ${NIFI_MIGRATION_FLOW_XML_SFTP_PASSWORD:captech123}
      remote-path: ${NIFI_MIGRATION_FLOW_XML_REMOTE_PATH:/Capillary testing/flow.xml/flow.xml}
